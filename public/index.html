document.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fetch('/api/data');
    if (!r.ok) throw new Error('no server');
    allData = await r.json();
  } catch(_) {
    allData = FALLBACK_DATA;
  }
  renderCatalog();
  restoreTab();
  updateCartUI();
  initUserFields();
});

// ── Catalog render ─────────────────────────────────────────────────────────────
function renderCatalog() {
  if (allData.title)    document.getElementById('page-title').textContent    = allData.title;
  if (allData.subtitle) document.getElementById('page-subtitle').textContent = allData.subtitle;

  // Intro
  if (allData.introText || allData.processSteps) {
    let h = '';
    if (allData.introText) h += `<div class="intro-box">${allData.introText}</div>`;
    if (allData.processSteps && allData.processSteps.length) {
      allData.processSteps = allData.processSteps.map(s => typeof s === 'string' ? {text: s, note: ''} : s);
      h += `<h2>📋 Jak objednat OOPP</h2><ol class="process-list">`;
      allData.processSteps.forEach(s => {
        const note = s.note ? `<span class="step-note">${s.note}</span>` : '';
        h += `<li><span>${s.text}${note}</span></li>`;
      });
      h += `</ol>`;
      h += `<div class="email-vzor-wrap">
        <div class="email-vzor-box">
          <div class="email-vzor-hdr">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgb(0,100,180)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            Vzor e-mailu pro objednávku OOPP
          </div>
          <div class="email-vzor-body"><span class="lbl">Komu:</span> jmeno.prijmeni@engel-gematex.com
<span class="lbl">Předmět:</span> Objednávka OOPP

Dobrý den,

zasílám objednávku OOPP:

<span class="lbl">Oddělení:</span> [Vaše oddělení]
<span class="lbl">Objednatel:</span> [Vaše jméno]

<span class="lbl">Položky:</span>
  • Kat. č. XX  –  Název položky  –  vel. XL  –  2 ks
  • Kat. č. XX  –  Název položky  –  vel. 42  –  1 ks</div>
        </div>
        <div class="email-tip">
          <strong>💡 Tip:</strong><br>
          Použijte tlačítko <b>Košík → Kopírovat objednávku</b> vpravo dole — text e-mailu se automaticky zkopíruje do schránky se správným formátem. Stačí ho vložit do e-mailu.
        </div>
      </div>`;
    }
    document.getElementById('intro-section').innerHTML = h;
  }

  const nav     = document.getElementById('tab-nav');
  const content = document.getElementById('tab-content');
  nav.innerHTML = content.innerHTML = '';

  (allData.departments || []).forEach((dept, i) => {
    // Button
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.tab = dept.id;
    btn.textContent = (dept.icon ? dept.icon + ' ' : '') + (dept.shortName || dept.name);
    btn.onclick = () => switchTab(dept.id);
    nav.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + dept.id;
    panel.innerHTML = buildDeptHTML(dept);
    content.appendChild(panel);
  });
}

function buildDeptHTML(dept) {
  let h = '';

  // Nároky accordion
  h += `<div class="narok-section">
    <div class="narok-header" onclick="toggleNarok('${dept.id}')">
      <div class="narok-title">📋 Přehled nároků OOPP — ${esc(dept.name)}</div>
      <span id="narok-arrow-${dept.id}" style="font-size:1.1em;color:rgb(0,100,170)">▼</span>
    </div>
    <div class="narok-body" id="narok-body-${dept.id}">
      <table class="narok-table">
        <thead><tr>
          <th class="narok-kat">Kat.&nbsp;č.</th>
          <th>Položka OOPP</th>
          <th style="width:160px;text-align:center">Nárok / Četnost</th>
        </tr></thead>
        <tbody>${buildNarokRows(dept)}</tbody>
      </table>
    </div>
  </div>`;

  h += `<h2>${esc(dept.name)}</h2>`;

  if (dept.infoText) {
    h += `<div class="info-sales"><b>Důležité informace:</b><br>${dept.infoText}</div>`;
  }

  if (dept.description) {
    h += `<p>${dept.description}</p>`;
  }

  h += `<div class="table-scroll-wrap"><table class="item-table">
    <thead><tr>
      <th style="width:58px">Kat.&nbsp;č.</th>
      <th>Položka OOPP</th>
      <th class="dodav-th">Dodavatel</th>
      <th class="kod-th">Výrobce&nbsp;/&nbsp;kód</th>
      <th class="vel-th">Dostupné&nbsp;velikosti</th>
      <th class="img-th">Ilustrace</th>
      <th class="cart-th">Košík</th>
    </tr></thead>
    <tbody>`;

  (dept.categories || []).forEach(cat => {
    h += `<tr class="cat-row"><td colspan="7">${esc(cat.name)}</td></tr>`;
    (cat.items || []).forEach(item => { h += buildItemRow(item); });
  });

  h += `</tbody></table></div>`;
  return h;
}

function buildNarokRows(dept) {
  let r = '';
  (dept.categories || []).forEach(cat => {
    (cat.items || []).forEach(item => {
      r += `<tr>
        <td class="narok-kat">${esc(item.kat)}</td>
        <td>${esc(item.name)}</td>
        <td style="text-align:center">${narokBadge(item.narok)}</td>
      </tr>`;
    });
  });
  return r;
}

function narokBadge(val) {
  if (!val) return '<span class="narok-badge narok-prazdne">—</span>';
  if (/rok/i.test(val))     return `<span class="narok-badge narok-rok">${esc(val)}</span>`;
  if (/pot[rř]eby/i.test(val)) return `<span class="narok-badge narok-potreba">${esc(val)}</span>`;
  return `<span class="narok-badge narok-pozadavku">${esc(val)}</span>`;
}

function buildItemRow(item) {
  const imgHtml = item.image
    ? `<img class="thumb-img" src="${esc(item.image)}" alt="${esc(item.name)}" onclick="openLightbox(this)" onerror="this.style.display='none'">`
    : `<span class="no-img">—</span>`;

  let cartHtml;
  const itemJson = esc(JSON.stringify(item));
  if (item.isEs) {
    cartHtml = `<div class="cart-es-wrap">
      <button class="cart-add-btn cart-add-es" onclick="openModal('${itemJson}')">+ Přidat (ES)</button>
      <a class="es-size-link" href="https://www.strauss.com" target="_blank" rel="noopener">🔗 Tabulka vel.</a>
    </div>`;
  } else {
    cartHtml = `<button class="cart-add-btn" onclick="openModal('${itemJson}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      + Přidat</button>`;
  }

  return `<tr>
    <td>${esc(item.kat)}</td>
    <td>${esc(item.name)}${item.maxPrice ? `<br><span style="color:#c0392b;font-weight:700;font-size:.82em">Max. ${esc(item.maxPrice)} ${esc(item.maxPriceCurrency||'CZK')}</span>` : ''}</td>
    <td style="font-size:.9em">${esc(item.supplier||'—')}</td>
    <td style="font-size:.85em;color:#555">${esc(item.code||'—')}</td>
    <td class="vel-td">${esc(item.sizes||'')}</td>
    <td class="img-cell">${imgHtml}</td>
    <td class="cart-td">${cartHtml}</td>
  </tr>`;
}

// ── Tab switching ──────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const p = document.getElementById('panel-' + id);
  const b = document.querySelector(`.tab-btn[data-tab="${id}"]`);
  if (p) p.classList.add('active');
  if (b) b.classList.add('active');
  localStorage.setItem('oopp-active-tab', id);
}
function restoreTab() {
  const t = localStorage.getItem('oopp-active-tab');
  if (t && document.getElementById('panel-' + t)) switchTab(t);
}

function toggleNarok(dep) {
  const body  = document.getElementById('narok-body-' + dep);
  const arrow = document.getElementById('narok-arrow-' + dep);
  if (!body) return;
  body.classList.toggle('collapsed');
  if (arrow) arrow.textContent = body.classList.contains('collapsed') ? '▲' : '▼';
}

// ── Cart modal ─────────────────────────────────────────────────────────────────
function openModal(itemJson) {
  modalItem = JSON.parse(itemJson);
  document.getElementById('modal-item-name').textContent = modalItem.name;
  document.getElementById('modal-item-sub').textContent  = 'Kat. č. ' + modalItem.kat;
  const sizeField  = document.getElementById('modal-size-field');
  const sizeSelect = document.getElementById('modal-size');
  if (modalItem.isEs) {
    sizeField.style.display = 'none';
    document.getElementById('modal-item-sub').textContent += ' — Engelbert-Strauss';
  } else {
    sizeField.style.display = '';
    sizeSelect.innerHTML = '';
    (modalItem.sizes || 'UNI').split(',').map(s => s.trim()).filter(Boolean).forEach(s => {
      const o = document.createElement('option');
      o.value = o.textContent = s;
      sizeSelect.appendChild(o);
    });
  }
  document.getElementById('modal-qty').value = 1;
  document.getElementById('cart-modal-overlay').classList.add('active');
}

function closeCartModal() {
  document.getElementById('cart-modal-overlay').classList.remove('active');
  modalItem = null;
}

function addToCartFromModal() {
  if (!modalItem) return;
  const qty = parseInt(document.getElementById('modal-qty').value) || 1;
  const vel = modalItem.isEs ? 'dle strauss.com' : document.getElementById('modal-size').value;
  cart.push({ kat: modalItem.kat, nazev: modalItem.name, vel, qty, isEs: !!modalItem.isEs });
  saveCart();
  updateCartUI();
  closeCartModal();
}

// ── Cart ───────────────────────────────────────────────────────────────────────
function saveCart() { localStorage.setItem('oopp-cart', JSON.stringify(cart)); }

function updateCartUI() {
  const total   = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const isEmpty = cart.length === 0;
  const panel   = document.getElementById('cart-panel');
  const wasHidden = panel.classList.contains('hidden');
  document.getElementById('cart-badge').textContent = total;
  panel.classList.toggle('hidden', isEmpty);
  // collapse body when panel first appears
  if (wasHidden && !isEmpty) {
    document.getElementById('cart-body').classList.add('collapsed');
    document.getElementById('cart-toggle-btn').textContent = '▲';
  }
  document.getElementById('cart-empty-msg').style.display = isEmpty ? 'block' : 'none';

  const list = document.getElementById('cart-items-list');
  list.innerHTML = '';
  cart.forEach((item, idx) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="cart-item-kat">${esc(item.kat)}</span>
      <span class="cart-item-name">${esc(item.nazev)}</span>
      <span class="cart-item-vel">${esc(item.vel)}</span>
      <span class="cart-item-qty">${item.qty}&nbsp;ks</span>
      <button class="cart-item-del" onclick="removeItem(${idx})">✕</button>`;
    list.appendChild(li);
  });
}

function removeItem(idx) {
  cart.splice(idx, 1);
  saveCart();
  updateCartUI();
}

function clearCart(btn) {
  if (btn.dataset.confirm !== '1') {
    btn.dataset.confirm = '1';
    btn.textContent = 'Opravdu?';
    btn.style.cssText += ';color:#c00;border-color:#c00';
    setTimeout(() => {
      btn.dataset.confirm = '';
      btn.textContent = 'Vyprázdnit';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 3000);
    return;
  }
  cart = [];
  saveCart();
  updateCartUI();
}

function toggleCart() {
  const body = document.getElementById('cart-body');
  const btn  = document.getElementById('cart-toggle-btn');
  body.classList.toggle('collapsed');
  btn.textContent = body.classList.contains('collapsed') ? '▲' : '▼';
}

function initUserFields() {
  const deptEl = document.getElementById('cart-dept');
  const nameEl = document.getElementById('cart-name');
  deptEl.value = localStorage.getItem('oopp-dept') || '';
  nameEl.value = localStorage.getItem('oopp-name') || '';
  deptEl.oninput = e => localStorage.setItem('oopp-dept', e.target.value);
  nameEl.oninput = e => localStorage.setItem('oopp-name', e.target.value);
}

function copyCart() {
  const dept = document.getElementById('cart-dept').value || '—';
  const name = document.getElementById('cart-name').value || '—';
  const date = new Date().toLocaleDateString('cs-CZ');
  const subject = 'Objednávka OOPP';
  const lines = [
    `Předmět: ${subject}`,
    '',
    'Dobrý den,',
    '',
    'zasílám objednávku OOPP:',
    '',
    `Oddělení: ${dept}`,
    `Objednatel: ${name}`,
    `Datum: ${date}`,
    '',
    'Položky:'
  ];
  cart.forEach(item => {
    const vel = item.isEs ? 'vel. dle strauss.com' : `vel. ${item.vel}`;
    lines.push(`  • Kat. č. ${item.kat}  –  ${item.nazev}  –  ${vel}  –  ${item.qty} ks`);
  });
  const text = lines.join('\n');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(showCopied);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(); } catch(_) {}
    document.body.removeChild(ta);
  }
}

function showCopied() {
  const m = document.getElementById('cart-copied-msg');
  m.style.display = 'block';
  setTimeout(() => { m.style.display = 'none'; }, 3000);
}

// ── Lightbox ───────────────────────────────────────────────────────────────────
function openLightbox(img) {
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeCartModal(); }
});

// ── Helpers ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
